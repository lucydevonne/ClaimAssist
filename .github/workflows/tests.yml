name: ClaimAssist Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run API and database tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: claimassist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d claimassist_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_NAME: ClaimAssist
      ENVIRONMENT: test
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/claimassist_test
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/claimassist_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest